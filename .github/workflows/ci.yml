name: Routiq CI Pipeline

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

jobs:
  backend-checks:
    name: Backend Validation & Testing
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: routiq_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install Dependencies
        run: npm ci


      - name: Linter Check (ESLint)
        run: npm run lint

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/routiq_test?schema=public"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5433/routiq_test?schema=public"

      - name: Run Prisma Database Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/routiq_test?schema=public"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5433/routiq_test?schema=public"

      - name: Run Unit Tests
        run: npm run test

      - name: Run Integration Tests
        run: npm run test:integration
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/routiq_test?schema=public"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5433/routiq_test?schema=public"

      - name: Run End-to-End (E2E) & Regression Tests
        run: npm run test:e2e
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/routiq_test?schema=public"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5433/routiq_test?schema=public"

  frontend-checks:
    name: Frontend Validation & Testing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci


      - name: Linter Check (ESLint)
        run: npm run lint

      - name: TypeScript Compile & Type-Check
        run: npm run type-check

      - name: Production Build Check
        run: npm run build

      - name: Run Unit & Component Tests (Vitest)
        run: npm run test:unit:run

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests (Playwright)
        run: npm run test:e2e
