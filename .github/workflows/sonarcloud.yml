name: SonarCloud Analysis

on:
  push:
    branches: [main, development, feature/sonarqube-testing]
  pull_request:
    branches: [main, development]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Run backend unit tests with coverage
        run: cd backend && npm run test:cov

      - name: Fix coverage paths for monorepo
        run: sed -i 's|SF:src|SF:backend/src|g' backend/coverage/lcov.info

      - name: Run frontend unit tests with coverage
        run: cd frontend && npx vitest run --coverage

      - name: Fix frontend coverage paths for monorepo
        run: sed -i 's|SF:src|SF:frontend/src|g' frontend/coverage/lcov.info

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.ROUTIQ_SONAR }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_SCANNER_SKIP_JRE_PROVISIONING: true