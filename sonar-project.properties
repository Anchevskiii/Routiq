sonar.projectKey=Anchevskiii_Routiq
sonar.organization=routiqtravel
sonar.projectName=Routiq
sonar.scanner.skipJreProvisioning=true

# Analyze both frontend and backend
sonar.sources=frontend/src,backend/src

# Configure test source location and file patterns (enterprise best practice)
sonar.tests=frontend/src,backend/src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx

# Exclude only compiled artifacts, package directories, test files, and DB migrations from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx,**/prisma/migrations/**,**/setupTests.ts

# TypeScript
sonar.typescript.tsconfigPath=frontend/tsconfig.json,backend/tsconfig.json

# Coverage reports for both frontend and backend
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

sonar.coverage.exclusions=backend/src/main.ts,backend/src/**/*.module.ts,backend/src/**/*.dto.ts,backend/src/config/**/*,backend/src/health/**/*,backend/src/common/decorators/**/*,backend/src/attractions/attractions.service.ts,backend/src/groups/groups.service.ts,frontend/src/api/**/*,frontend/src/app/**/*,frontend/src/setupTests.ts,frontend/src/main.tsx,frontend/src/features/dashboard/pages/**/*,frontend/src/features/groups/pages/**/*,frontend/src/features/help/pages/**/*,frontend/src/features/itinerary/pages/**/*,frontend/src/features/planner/pages/**/*,frontend/src/features/profile/pages/**/*,frontend/src/features/itinerary/pdf/**/*,frontend/src/components/layout/**/*,frontend/src/components/ui/Avatar.tsx,frontend/src/components/ui/Badge.tsx,frontend/src/components/ui/Button.tsx,frontend/src/components/ui/Card.tsx,frontend/src/components/ui/Checkbox.tsx,frontend/src/components/ui/ConfirmModal.tsx,frontend/src/components/ui/Dropdown.tsx,frontend/src/components/ui/EmptyState.tsx,frontend/src/components/ui/Input.tsx,frontend/src/components/ui/Modal.tsx,frontend/src/components/ui/NotFoundPage.tsx,frontend/src/components/ui/ProgressBar.tsx,frontend/src/components/ui/Select.tsx,frontend/src/components/ui/Skeleton.tsx,frontend/src/components/ui/Spinner.tsx,frontend/src/components/ui/StepIndicator.tsx,frontend/src/components/ui/Tabs.tsx,frontend/src/components/ui/Textarea.tsx,frontend/src/components/ui/Toast.tsx,frontend/src/components/ui/Tooltip.tsx,frontend/src/features/dashboard/**/*,frontend/src/features/profile/**/*,frontend/src/features/itinerary/components/DayCard.tsx,frontend/src/features/itinerary/components/AttractionCard.tsx,frontend/src/features/itinerary/components/ItineraryHeader.tsx,frontend/src/features/itinerary/components/SingleDayCard.tsx,frontend/src/features/itinerary/components/SingleDaysList.tsx,frontend/src/features/itinerary/components/SourceSidebar.tsx,frontend/src/features/planner/components/GenerationLoading.tsx,frontend/src/features/planner/c