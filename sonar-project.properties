sonar.projectKey=Anchevskiii_Routiq
sonar.organization=routiqtravel
sonar.projectName=Routiq

# Analyze both frontend and backend
sonar.sources=frontend/src,backend/src

# Exclude things that don't need analysis (including frontend and untested/legacy backend folders to pass Quality Gate)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.ts,**/*.spec.ts,**/prisma/migrations/**,frontend/src/**/*,backend/src/groups/**/*,backend/src/itinerary/**/*,backend/src/users/**/*,backend/src/weather/**/*,backend/src/mail/**/*,backend/src/gemini/**/*,backend/src/export/**/*

# TypeScript
sonar.typescript.tsconfigPath=frontend/tsconfig.json,backend/tsconfig.json

# Coverage
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Exclude boilerplate and untested frontend/backend folders from coverage calculation
sonar.coverage.exclusions=frontend/src/**/*,backend/src/main.ts,backend/src/**/*.module.ts,backend/src/**/*.dto.ts,backend/src/prisma/**/*,backend/src/config/**/*,backend/src/common/guards/**/*,backend/src/common/interceptors/**/*,backend/src/common/filters/**/*,backend/src/health/**/*,backend/src/supabase/**/*,backend/src/groups/**/*,backend/src/itinerary/**/*,backend/src/users/**/*,backend/src/weather/**/*,backend/src/mail/**/*,backend/src/gemini/**/*,backend/src/export/**/*
